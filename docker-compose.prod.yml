services:
  app:
    build:
      context: .

    container_name: aldahim_app

    restart: unless-stopped

    env_file:
      - .env.prod.local

    networks:
      - web
      - internal

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.aldahim.com`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=80"

networks:
  web:
    external: true

  internal:
    external: true
