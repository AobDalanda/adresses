name: Deploy Aldahim API

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy on VPS resolved
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}

                  script: |
                      set -e

                      cd /opt/aldahim/app

                      echo "Pull latest code"
                      git pull origin main

                      echo "Rebuild application"
                      docker compose -f docker-compose.prod.yml build app

                      echo "Restart application"
                      docker compose -f docker-compose.prod.yml up -d app

                      echo "Run migrations"
                      docker exec aldahim_app php bin/console doctrine:migrations:migrate --no-interaction

                      echo "Clear cache"
                      docker exec aldahim_app php bin/console cache:clear --env=prod

                      echo "Warmup cache"
                      docker exec aldahim_app php bin/console cache:warmup --env=prod

                      echo "Deployment completed"
